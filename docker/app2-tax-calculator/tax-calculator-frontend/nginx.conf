server {
    listen 80;

    # Serve React SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → service-a:3000 (strips /api prefix)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://service-a:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}